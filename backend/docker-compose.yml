services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudguest-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cloudguest_logs:/var/log/cloudguest
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: cloudguest-postgres
    environment:
      POSTGRES_DB: cloudguest
      POSTGRES_USER: cloudguest
      POSTGRES_PASSWORD: cloudguest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudguest -d cloudguest"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloudguest-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  cloudguest_logs:

